<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Sinus Achterbahn</title>
    <!-- A-Frame Bibliothek (Version 0.9.2 für reines WebVR) -->
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <!-- WebVR Polyfill: Zwingt den Browser, alte WebVR-Funktionen zu simulieren -->
    <script src="https://cdn.jsdelivr.net/npm/webvr-polyfill@0.10.12/build/webvr-polyfill.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto; /* Erlaubt Scrollen, falls der Bildschirm extrem klein ist */
        }
        h1 {
            font-size: 1.5rem;
            margin: 10px 0;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-shrink: 0; /* Verhindert, dass der Button zusammengequetscht wird */
        }
        .info {
            max-width: 600px;
            padding: 5px 10px;
            line-height: 1.3;
            font-size: 1rem;
        }
        .info p {
            margin: 5px 0;
        }
        .warning {
            color: #ffcc00;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        /* --- A-Frame VR-Button zentrieren und vergrößern --- */
        .a-enter-vr {
            position: absolute !important;
            bottom: 40px !important; /* Abstand nach unten, um Browser-Leisten zu meiden */
            left: 50% !important;
            right: auto !important;
            transform: translateX(-50%) !important;
            display: flex !important;
            justify-content: center !important;
        }
        .a-enter-vr-button {
            transform: scale(1.5) !important; /* Macht den Button 50% größer */
            transform-origin: bottom center !important;
        }
    </style>
</head>
<body>

    <!-- Overlay Screen für den Start -->
    <div id="start-overlay">
        <h1>Mathe VR: Die Sinus-Bahn</h1>
        <div class="info">
            <p>1. Halte das Handy <strong>QUER</strong> (Landscape).</p>
            <p>2. Klicke auf "Starten".</p>
            <p>3. Klicke unten mittig auf das <strong>VR-Symbol</strong>.</p>
        </div>
        <div class="warning">Hinweis: Funktioniert nur über HTTPS oder localhost!</div>
        <button onclick="startExperience()">Starten</button>
    </div>

    <!-- Die 3D Szene -->
    <!-- vr-mode-ui ist in 0.9.2 standardmäßig an, wir lassen es zur Sicherheit drin -->
    <a-scene background="color: #87CEEB" 
             fog="type: linear; color: #87CEEB; near: 10; far: 100"
             vr-mode-ui="enabled: true">
        
        <!-- Assets Definition -->
        <a-assets>
            <img id="grid-tex" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzjwqkJYhDAMwwBWRDAmGwADIQd45Sq3AgAAAABJRU5ErkJggg==">
        </a-assets>

        <!-- Umgebung: Boden -->
        <a-plane position="0 -5 0" rotation="-90 0 0" width="200" height="200" 
                 color="#222" material="src: #grid-tex; repeat: 100 100" shadow></a-plane>

        <!-- Himmel -->
        <a-sky color="#87CEEB"></a-sky>

        <!-- Das "Fahrzeug" (Kamera-Rig) -->
        <a-entity id="rig" position="0 0 0">
            <a-entity id="camera" camera look-controls position="0 1.6 0">
                
                <!-- Visuelles Fadenkreuz (Reticle) -->
                <a-entity cursor="fuse: false"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                          material="color: black; shader: flat; opacity: 0.5">
                </a-entity>

                <!-- HUD: Heads-Up Display für Daten -->
                <a-entity position="0 -0.6 -2" geometry="primitive: plane; width: 2.2; height: 0.8" material="color: #000; opacity: 0.7">
                    <a-text id="hud-text" 
                            value="Lade..." 
                            align="center" 
                            width="3.5" 
                            position="0 0 0.01"
                            color="#FFF">
                    </a-text>
                </a-entity>

            </a-entity>
        </a-entity>

        <!-- Container für die visuelle Strecke -->
        <a-entity id="track-container"></a-entity>

        <!-- Licht -->
        <a-entity light="type: ambient; color: #BBB"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-0.5 1 1"></a-entity>

    </a-scene>

    <script>
        // --- WEBVR POLYFILL INITIALISIERUNG ---
        // Dies zwingt ältere Geräte oder Browser ohne native VR-Unterstützung in den Cardboard-Modus
        try {
            const polyfill = new WebVRPolyfill();
        } catch (e) {
            console.log("Polyfill Fehler (kann ignoriert werden, wenn native VR vorhanden):", e);
        }

        // --- KONFIGURATION DER FUNKTION ---
        const AMPLITUDE = 4; 
        const FREQUENCY = 0.3; 
        const LENGTH = 200; 
        
        // Geschwindigkeit
        const BASE_SPEED = 0.1; 
        let currentX = 0;
        let isRunning = false;

        // Referenzen auf DOM Elemente
        const scene = document.querySelector('a-scene');
        const rig = document.getElementById('rig');
        const hud = document.getElementById('hud-text');
        const trackContainer = document.getElementById('track-container');

        // Funktion: f(x)
        function f(x) {
            return AMPLITUDE * Math.sin(FREQUENCY * x);
        }

        // Ableitung: f'(x)
        function derive(x) {
            return AMPLITUDE * FREQUENCY * Math.cos(FREQUENCY * x);
        }

        function buildTrack() {
            const steps = 300; 
            const stepSize = LENGTH / steps;
            
            // Nutze einen HTML-String, um das Erzeugen von Custom-Elements Bug in älteren A-Frame Versionen zu umgehen
            let trackHTML = '';

            for (let i = 0; i < steps; i++) {
                let x = i * stepSize;
                let y = f(x);
                let slope = derive(x);
                let angleDeg = Math.atan(slope) * (180 / Math.PI);
                
                // Füge Schiene als String hinzu
                trackHTML += `<a-box position="${x} ${y - 0.5} 0" width="0.8" height="0.2" depth="0.5" color="#FF5722" rotation="0 0 ${angleDeg}"></a-box>`;

                // Füge Stützen hinzu
                if (i % 5 === 0) {
                    let height = Math.abs(y + 5); 
                    let posY = (y - 5)/2 - 2.5;
                    trackHTML += `<a-cylinder position="${x} ${posY} 0" height="${height}" radius="0.1" color="#888"></a-cylinder>`;
                }
            }
            
            // Alles auf einmal ins DOM laden
            trackContainer.innerHTML = trackHTML;
        }

        function startExperience() {
            document.getElementById('start-overlay').style.display = 'none';
            buildTrack();
            isRunning = true;
            loop();
        }

        function loop() {
            if (!isRunning) return;

            let y = f(currentX);
            let slope = derive(currentX); 
            
            let velocity = BASE_SPEED - (slope * 0.03);
            if (velocity < 0.02) velocity = 0.02; 
            
            currentX += velocity;

            if (currentX > LENGTH) {
                currentX = 0;
            }
            
            rig.setAttribute('position', {
                x: currentX, 
                y: y, 
                z: 0
            });

            // Konstante Blickrichtung (kein Nicken, um Übelkeit zu vermeiden)
            rig.setAttribute('rotation', {
                x: 0, 
                y: -90, 
                z: 0 
            });

            let displayX = (currentX * FREQUENCY).toFixed(2); 
            let displayY = (y / AMPLITUDE).toFixed(2); 
            let displaySlope = (Math.cos(currentX * FREQUENCY)).toFixed(2);
            
            hud.setAttribute('value', 
                `Pos x: ${displayX}\n` +
                `f(x): ${displayY}\n` + 
                `m: ${displaySlope}`
            );

            requestAnimationFrame(loop);
        }

    </script>
</body>
</html>
